version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spirit-postgres
    environment:
      POSTGRES_USER: spirit
      POSTGRES_PASSWORD: spirit123
      POSTGRES_DB: spirit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spirit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spirit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spirit-api
    environment:
      DATABASE_URL: postgresql+asyncpg://spirit:spirit123@postgres:5432/spirit
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./spirit:/app/spirit
    command: uvicorn spirit.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./spirit/web
      dockerfile: Dockerfile
    container_name: spirit-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: /api/v1
    depends_on:
      - api
    volumes:
      - ./spirit/web:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
