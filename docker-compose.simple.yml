version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spirit-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/spirit.db
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-spirit-default-key-change-this}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 500M
